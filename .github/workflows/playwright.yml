name: Playwright Tests

on:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests (Chromium)
        run: npx playwright test --project=chromium --reporter=blob
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report
          path: blob-report/
          retention-days: 1

  report:
    name: Create test report
    needs: [test]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Download blob report
        uses: actions/download-artifact@v4
        with:
          name: blob-report
          path: blob-report

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./blob-report

      - name: Merge into JUnit report
        run: npx playwright merge-reports --reporter junit ./blob-report
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results.xml

      - name: Publish results to GitHub summary
        uses: dorny/test-reporter@v1
        if: ${{ !cancelled() }}
        with:
          name: Playwright – Chromium
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
